version: '3.8'

services:
  gateway:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-lidio}/projectengsoft-gateway:latest
    container_name: plataforma-gateway-prod
    ports:
      - "80:80"
    networks:
      - plataforma-network
    restart: always

  auth-service:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-lidio}/projectengsoft-auth:latest
    container_name: plataforma-auth-service-prod
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_HOST=auth-db
      - DB_PORT=5432
      - DB_NAME=${AUTH_DB_NAME:-auth_db}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_key_change_in_production}
    networks:
      - plataforma-network
    restart: always

  academic-service:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-lidio}/projectengsoft-academic:latest
    container_name: plataforma-academic-service-prod
    environment:
      - NODE_ENV=production
      - PORT=3002
      - DB_HOST=academic-db
      - DB_PORT=5432
      - DB_NAME=${ACADEMIC_DB_NAME:-academic_db}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_key_change_in_production}
      - AUTH_SERVICE_URL=http://auth-service:3001/api/auth
    networks:
      - plataforma-network
    restart: always

  assignment-service:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-lidio}/projectengsoft-assignment:latest
    container_name: plataforma-assignment-service-prod
    environment:
      - NODE_ENV=production
      - PORT=3003
      - DB_HOST=assignment-db
      - DB_PORT=5432
      - DB_NAME=${ASSIGNMENT_DB_NAME:-assignment_db}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_key_change_in_production}
      - AUTH_SERVICE_URL=http://auth-service:3001/api/auth
      - ACADEMIC_SERVICE_URL=http://academic-service:3002/api/academic
    networks:
      - plataforma-network
    restart: always

  # Databases (Mesmos da infra, mas em modo prod)
  auth-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${AUTH_DB_NAME:-auth_db}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    networks:
      - plataforma-network
    restart: always

  academic-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${ACADEMIC_DB_NAME:-academic_db}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    networks:
      - plataforma-network
    restart: always

  assignment-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${ASSIGNMENT_DB_NAME:-assignment_db}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    networks:
      - plataforma-network
    restart: always

networks:
  plataforma-network:
    driver: bridge
