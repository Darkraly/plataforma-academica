upstream frontend {
    server frontend:80;
}

upstream auth_service {
    server auth-service:3001;
}

upstream academic_service {
    server academic-service:3002;
}

upstream assignment_service {
    server assignment-service:3003;
}

# Rate limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

server {
    listen 80;
    server_name localhost;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;


    # CORS headers
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Correlation-ID' always;

    # Handle preflight requests
    location @cors_preflight {
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Correlation-ID';
        add_header 'Access-Control-Max-Age' 86400;
        add_header 'Content-Length' 0;
        return 204;
    }

    # Health check do gateway
    location /health {
        return 200 '{"status":"UP","service":"api-gateway"}';
        add_header Content-Type application/json;
    }

    # Auth Service
    location /api/auth/ {
        limit_req zone=api burst=20 nodelay;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Correlation-ID';
            add_header 'Access-Control-Max-Age' 86400;
            return 204;
        }

        proxy_pass http://auth_service/api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Correlation-ID $http_x_correlation_id;
    }

    # Auth Service - Health check direto
    location = /api/auth/health {
        proxy_pass http://auth_service/health;
        proxy_set_header Host $host;
    }

    # Academic Service
    location /api/academic/ {
        limit_req zone=api burst=20 nodelay;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Correlation-ID';
            add_header 'Access-Control-Max-Age' 86400;
            return 204;
        }

        proxy_pass http://academic_service/api/academic/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Correlation-ID $http_x_correlation_id;
    }

    # Academic Service - Health check
    location = /api/academic/health {
        proxy_pass http://academic_service/health;
        proxy_set_header Host $host;
    }

    # Assignment Service
    location /api/assignments/ {
        limit_req zone=api burst=20 nodelay;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Correlation-ID';
            add_header 'Access-Control-Max-Age' 86400;
            return 204;
        }

        proxy_pass http://assignment_service/api/assignments/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Correlation-ID $http_x_correlation_id;
    }

    # Assignment Service - Health check
    location = /api/assignments/health {
        proxy_pass http://assignment_service/health;
        proxy_set_header Host $host;
    }

    # Frontend Application
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
