name: Continuous Deployment (CD)

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Auth Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/auth-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-auth:latest

      - name: Build and push Academic Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/academic-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-academic:latest

      - name: Build and push Assignment Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/assignment-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-assignment:latest

      - name: Build and push Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./gateway
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-gateway:latest
