name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # ==========================================
  # Lint - Verificação de código
  # ==========================================
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, academic-service, assignment-service]
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Instalar dependências
        working-directory: services/${{ matrix.service }}
        run: npm ci

      - name: Executar ESLint
        working-directory: services/${{ matrix.service }}
        run: npm run lint

  # ==========================================
  # Test - Testes unitários e de integração
  # ==========================================
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        service: [auth-service]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: auth_db_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Instalar dependências
        working-directory: services/${{ matrix.service }}
        run: npm ci

      - name: Executar testes
        working-directory: services/${{ matrix.service }}
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: auth_db_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: ci_test_secret_key
          JWT_EXPIRES_IN: 1h
        run: npm test

  # ==========================================
  # Security - Auditoria de dependências
  # ==========================================
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, academic-service, assignment-service]
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar dependências
        working-directory: services/${{ matrix.service }}
        run: npm ci

      - name: npm audit
        working-directory: services/${{ matrix.service }}
        run: npm audit --audit-level=high || true

  # ==========================================
  # Build - Verificação de build Docker
  # ==========================================
  build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        service: [auth-service, academic-service, assignment-service]
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: false
          tags: plataforma-academica/${{ matrix.service }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  # Build Gateway
  # ==========================================
  build-gateway:
    name: 🌐 Gateway Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagem Gateway
        uses: docker/build-push-action@v5
        with:
          context: gateway
          push: false
          tags: plataforma-academica/gateway:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
